apiVersion: kustomize.config.k8s.io/v1beta1
namespace: argocd
resources:
  - ../../base/argocd
  - ../../base/cert-manager
  - ../../base/cloudnative-pg
  - ../../base/ingress
  - ../../base/local-path-provisioner
  - ../../base/reflector
  - ../../base/sealed-secrets
  - ../../base/traefik
  - ../../base/{{ copier__project_slug }}
kind: Kustomization
patches:
  - patch: |-
      - op: replace
        path: /spec/source/targetRevision
        value: develop
      - op: replace
        path: /spec/source/path
        value: k8s/argocd/overlays/staging/ingress
    target:
      kind: Application
      name: ingress
  - patch: |-
      - op: replace
        path: /spec/source/targetRevision
        value: develop
      - op: replace
        path: /metadata/name
        value: {{ copier__project_slug }}-staging
      - op: replace
        path: /spec/source/path
        value: k8s/{{ copier__project_slug }}/overlays/staging
      - op: replace
        path: /spec/destination/namespace
        value: {{ copier__project_slug }}-staging
    target:
      kind: Application
      name: {{ copier__project_slug }}-prod
