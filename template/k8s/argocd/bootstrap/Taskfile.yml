version: '3'
dotenv:
  - .env
  - env/{{ "'{{.ENV}}'" }}.env
vars:
  ENV: {{ "'{{.ENV}}'" }}

includes:
  argocd:
    taskfile: ./argocd.yaml
    vars:
      ENV: {{ "'{{.ENV}}'" }}
      ARGOCD_VERSION: {{ "'{{.ARGOCD_VERSION}}'" }}

tasks:
  default:
    desc: |
      List all available tasks in the Taskfile.
    cmds:
      - task --list
